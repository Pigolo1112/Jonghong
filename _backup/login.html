<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ระบบจองห้องประชุม คณะวิทยาศาสตร์และนวัตกรรมดิจิทัล - เข้าสู่ระบบ">
    <title>เข้าสู่ระบบ | ระบบจองห้องประชุม</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-page">
        <!-- Decorative Circles -->
        <div style="position:absolute;width:200px;height:200px;border:2px solid rgba(255,255,255,0.08);border-radius:50%;top:10%;left:5%;animation:float 10s ease-in-out infinite"></div>
        <div style="position:absolute;width:150px;height:150px;border:2px solid rgba(255,255,255,0.05);border-radius:50%;bottom:15%;right:10%;animation:float 7s ease-in-out infinite reverse"></div>
        
        <div class="login-container" id="login-container">
            <!-- Logo -->
            <div class="login-logo">
                <div class="logo-icon">🏛️</div>
                <h1>ระบบจองห้องประชุม</h1>
                <p>คณะวิทยาศาสตร์และนวัตกรรมดิจิทัล</p>
            </div>

            <!-- Tab Switcher -->
            <div class="tabs" style="justify-content:center;margin-bottom:24px;border-bottom:2px solid var(--border-color)">
                <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">เข้าสู่ระบบ</button>
                <button class="tab-btn" id="tab-register" onclick="switchTab('register')">สมัครสมาชิก</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">อีเมล <span class="required">*</span></label>
                    <input type="email" class="form-input" id="login-email" placeholder="example@university.ac.th" required>
                </div>
                <div class="form-group">
                    <label class="form-label">รหัสผ่าน <span class="required">*</span></label>
                    <input type="password" class="form-input" id="login-password" placeholder="••••••••" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-block" id="login-btn" style="margin-top:8px">
                    <span id="login-btn-text">เข้าสู่ระบบ</span>
                    <div class="spinner" id="login-spinner" style="display:none"></div>
                </button>
            </form>

            <!-- Register Form -->
            <form id="register-form" style="display:none" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label">ชื่อ-นามสกุล <span class="required">*</span></label>
                    <input type="text" class="form-input" id="reg-name" placeholder="ชื่อ นามสกุล" required>
                </div>
                <div class="form-group">
                    <label class="form-label">อีเมล <span class="required">*</span></label>
                    <input type="email" class="form-input" id="reg-email" placeholder="example@university.ac.th" required>
                </div>
                <div class="form-group">
                    <label class="form-label">รหัสผ่าน <span class="required">*</span></label>
                    <input type="password" class="form-input" id="reg-password" placeholder="อย่างน้อย 6 ตัวอักษร" required minlength="6">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">ประเภทผู้ใช้</label>
                        <select class="form-select" id="reg-role">
                            <option value="student">นิสิต</option>
                            <option value="staff">อาจารย์/บุคลากร</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">เบอร์โทรศัพท์</label>
                        <input type="tel" class="form-input" id="reg-phone" placeholder="08x-xxx-xxxx">
                    </div>
                </div>
                <div class="form-group" id="student-id-group">
                    <label class="form-label">รหัสนิสิต</label>
                    <input type="text" class="form-input" id="reg-student-id" placeholder="6xxxxxxxxx">
                </div>
                <div class="form-group">
                    <label class="form-label">ภาควิชา/สาขา</label>
                    <input type="text" class="form-input" id="reg-department" placeholder="เช่น วิทยาการคอมพิวเตอร์">
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-block" id="register-btn" style="margin-top:8px">
                    <span id="register-btn-text">สมัครสมาชิก</span>
                    <div class="spinner" id="register-spinner" style="display:none"></div>
                </button>
            </form>

            <!-- Divider -->
            <div style="display:flex;align-items:center;gap:12px;margin:24px 0">
                <div style="flex:1;height:1px;background:var(--border-color)"></div>
                <span style="font-size:0.8rem;color:var(--text-muted)">หรือ</span>
                <div style="flex:1;height:1px;background:var(--border-color)"></div>
            </div>

            <!-- Google Login -->
            <button class="btn btn-secondary btn-block" onclick="handleGoogleLogin()" style="padding:12px">
                <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.997 8.997 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
                เข้าสู่ระบบด้วย Google
            </button>

            <!-- Admin Promote Section -->
            <div style="margin-top:24px;text-align:center">
                <button class="btn btn-ghost btn-sm" onclick="toggleAdminSection()" style="font-size:0.78rem">
                    🔑 สำหรับผู้ดูแลระบบ
                </button>
                <div id="admin-section" style="display:none;margin-top:12px">
                    <div class="form-group" style="margin-bottom:8px">
                        <input type="password" class="form-input" id="admin-code" placeholder="กรอกรหัสผู้ดูแลระบบ" style="text-align:center;font-size:0.85rem">
                    </div>
                    <button class="btn btn-warning btn-sm btn-block" onclick="promoteAdmin()">อัพเกรดเป็น Admin</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script type="module">
        import { supabase } from './supabase-config.js';
        import { ToastManager } from './utils.js';

        // Make functions available globally
        window.supabase = supabase;

        // Check if already logged in
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            window.location.href = 'index.html';
        }

        // Switch tabs
        window.switchTab = function(tab) {
            document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
        };

        // Show/hide student ID field
        document.getElementById('reg-role')?.addEventListener('change', (e) => {
            document.getElementById('student-id-group').style.display = 
                e.target.value === 'student' ? 'block' : 'none';
        });

        // Login handler
        window.handleLogin = async function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            document.getElementById('login-btn-text').textContent = 'กำลังเข้าสู่ระบบ...';
            document.getElementById('login-spinner').style.display = 'inline-block';
            document.getElementById('login-btn').disabled = true;

            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                ToastManager.success('เข้าสู่ระบบสำเร็จ!');
                setTimeout(() => window.location.href = 'index.html', 800);
            } catch (err) {
                ToastManager.error(err.message === 'Invalid login credentials' 
                    ? 'อีเมลหรือรหัสผ่านไม่ถูกต้อง' : err.message);
            } finally {
                document.getElementById('login-btn-text').textContent = 'เข้าสู่ระบบ';
                document.getElementById('login-spinner').style.display = 'none';
                document.getElementById('login-btn').disabled = false;
            }
        };

        // Register handler
        window.handleRegister = async function(e) {
            e.preventDefault();
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const role = document.getElementById('reg-role').value;
            const phone = document.getElementById('reg-phone').value.trim();
            const studentId = document.getElementById('reg-student-id').value.trim();
            const department = document.getElementById('reg-department').value.trim();

            document.getElementById('register-btn-text').textContent = 'กำลังสมัคร...';
            document.getElementById('register-spinner').style.display = 'inline-block';
            document.getElementById('register-btn').disabled = true;

            try {
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            name,
                            role,
                            phone,
                            student_id: studentId,
                            department
                        }
                    }
                });
                if (error) throw error;

                // Update profile with additional info
                if (data.user) {
                    await supabase.from('profiles').upsert({
                        id: data.user.id,
                        name,
                        email,
                        role,
                        phone,
                        student_id: studentId,
                        department
                    });
                }

                ToastManager.success('สมัครสมาชิกสำเร็จ! กำลังเข้าสู่ระบบ...');
                setTimeout(() => window.location.href = 'index.html', 1000);
            } catch (err) {
                ToastManager.error(err.message || 'เกิดข้อผิดพลาดในการสมัครสมาชิก');
            } finally {
                document.getElementById('register-btn-text').textContent = 'สมัครสมาชิก';
                document.getElementById('register-spinner').style.display = 'none';
                document.getElementById('register-btn').disabled = false;
            }
        };

        // Google Login
        window.handleGoogleLogin = async function() {
            try {
                const { error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: { redirectTo: window.location.origin + '/index.html' }
                });
                if (error) throw error;
            } catch (err) {
                ToastManager.error('ไม่สามารถเข้าสู่ระบบด้วย Google ได้');
            }
        };

        // Toggle admin section
        window.toggleAdminSection = function() {
            const section = document.getElementById('admin-section');
            section.style.display = section.style.display === 'none' ? 'block' : 'none';
        };

        // Promote to admin
        window.promoteAdmin = async function() {
            const code = document.getElementById('admin-code').value;
            if (!code) {
                ToastManager.warning('กรุณากรอกรหัสผู้ดูแลระบบ');
                return;
            }
            try {
                const { data, error } = await supabase.rpc('promote_to_admin', { secret_code: code });
                if (error) throw error;
                if (data?.success) {
                    ToastManager.success(data.message);
                } else {
                    ToastManager.error(data?.message || 'รหัสไม่ถูกต้อง');
                }
            } catch (err) {
                ToastManager.error('เกิดข้อผิดพลาด: ' + err.message);
            }
        };
    </script>
</body>
</html>
